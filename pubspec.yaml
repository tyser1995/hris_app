name: hris_app
description: Human Resource Information System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4
  postgrest: ^2.6.0

  # Routing
  go_router: ^14.6.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI Components
  fl_chart: ^0.69.0
  data_table_2: ^2.7.2
  table_calendar: ^3.1.3
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  file_picker: ^8.3.7
  flutter_dotenv: ^5.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Exports
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.demo
